services:
  postgres:
    image: postgres:16-alpine
    container_name: storebridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: storebridge
      POSTGRES_USER: storebridge
      POSTGRES_PASSWORD: storebridge_dev_password
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_connections=off"
      - "-c"
      - "log_disconnections=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storebridge -d storebridge"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: storebridge-redis
    restart: unless-stopped
    ports:
      - "6390:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
