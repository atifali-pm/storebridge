name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck + lint + tests
    runs-on: ubuntu-latest
    env:
      # Placeholder values so the Zod env validator is satisfied in modules
      # that read env at import time. Real secrets belong in Railway / Vercel.
      NODE_ENV: test
      APP_URL: http://localhost:3000
      DATABASE_URL: postgres://storebridge:storebridge@localhost:5432/storebridge
      REDIS_URL: redis://localhost:6379
      SHOPIFY_API_KEY: ci_key
      SHOPIFY_API_SECRET: ci_secret_minimum_16_chars
      SHOPIFY_SCOPES: read_products,write_products,read_inventory,write_inventory
      SHOPIFY_APP_URL: http://localhost:3000
      SHOPIFY_API_VERSION: "2025-01"
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      LOG_LEVEL: error

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: storebridge
          POSTGRES_PASSWORD: storebridge
          POSTGRES_DB: storebridge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storebridge -d storebridge"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Apply migrations
        run: pnpm db:migrate

      - name: Tenant-isolation tests
        run: pnpm test:isolation

  build:
    name: next build
    runs-on: ubuntu-latest
    needs: verify
    env:
      NODE_ENV: production
      APP_URL: https://example.com
      DATABASE_URL: postgres://user:pass@localhost:5432/db
      SHOPIFY_API_KEY: ci_key
      SHOPIFY_API_SECRET: ci_secret_minimum_16_chars
      SHOPIFY_SCOPES: read_products
      SHOPIFY_APP_URL: https://example.com
      SHOPIFY_API_VERSION: "2025-01"
      APP_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      LOG_LEVEL: error

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
